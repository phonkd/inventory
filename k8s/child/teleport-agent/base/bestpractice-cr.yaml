apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: teleport-admin
subjects:
  - kind: User
    name: teleport-admin # must match what Teleport sends as the kube user
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin # built-in, or use "teleport-admin" if you made step 1
  apiGroup: rbac.authorization.k8s.io
